<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To Do List</h1>

        <div class="input-area">
            <input type="text" id="todo-input" placeholder="할 일을 입력하세요" onkeydown="handleEnter(event)">
            <button id="add-button" onclick="addTodo()">추가</button>
        </div> <!-- 입력창과 버튼 영역 끝 -->

        <ul id="todo-list"></ul>  <!-- 할 일 목록을 표시하는 영역 (입력창과 분리해서 관리/스타일링하기 위함) -->
    </div>

        <script src="script.js"></script>
</body>
</html>
